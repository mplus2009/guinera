name: Build and Sign APK (Auto Keystore)

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
    
    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Configurar Gradle
      uses: gradle/actions/setup-gradle@v3
    
    - name: Preparar Gradle Wrapper
      run: |
        if [ ! -f "gradlew" ]; then
          echo "📦 Generando Gradle Wrapper..."
          gradle wrapper
        fi
        chmod +x gradlew || true
    
    - name: Generar Keystore automáticamente
      run: |
        echo "🔑 Generando keystore temporal..."
        keytool -genkey -v \
          -keystore keystore.jks \
          -alias mi-alias \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass 123456 \
          -keypass 123456 \
          -dname "CN=Test, OU=Test, O=Test, L=Test, ST=Test, C=ES"
        echo "✅ Keystore creado: keystore.jks"
        echo "🔐 Contraseña: 123456"
        echo "🔑 Alias: mi-alias"
    
    - name: Parchear build.gradle para usar keystore
      run: |
        echo "📝 Configurando build.gradle..."
        
        # Buscar si existe signingConfigs
        if grep -q "signingConfigs" app/build.gradle; then
          echo "⚠️ signingConfigs encontrado, reemplazando..."
          python3 << 'PYTHON'
        import re
        with open('app/build.gradle', 'r') as f:
            content = f.read()
        
        # Reemplazar bloque signingConfigs
        pattern = r'signingConfigs\s*\{[^}]*\}'
        replacement = '''signingConfigs {
            release {
                storeFile file("keystore.jks")
                storePassword "123456"
                keyAlias "mi-alias"
                keyPassword "123456"
            }
        }'''
        
        content = re.sub(pattern, replacement, content, flags=re.DOTALL)
        
        # Asegurar que buildTypes use el signingConfig
        if 'signingConfig signingConfigs.release' not in content:
            content = content.replace(
                'release {',
                'release {\n            signingConfig signingConfigs.release'
            )
        
        with open('app/build.gradle', 'w') as f:
            f.write(content)
        print("✅ build.gradle actualizado")
        PYTHON
        else
          echo "⚠️ No existe signingConfigs, añadiendo..."
          cat >> app/build.gradle << 'GRADLE'

        signingConfigs {
            release {
                storeFile file("keystore.jks")
                storePassword "123456"
                keyAlias "mi-alias"
                keyPassword "123456"
            }
        }

        buildTypes {
            release {
                signingConfig signingConfigs.release
                minifyEnabled false
                proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            }
        }
        GRADLE
          echo "✅ signingConfigs añadido"
        fi
    
    - name: Compilar APK Release
      run: |
        echo "🏗️ Compilando APK..."
        ./gradlew assembleRelease || gradle assembleRelease
        echo "✅ Compilación completada"
    
    - name: Verificar APK generada
      run: |
        echo "📂 Archivos generados:"
        find app/build/outputs/apk -name "*.apk" -ls || echo "❌ No se encontraron APKs"
    
    - name: Subir APK firmada
      uses: actions/upload-artifact@v4
      with:
        name: app-release-signed
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30

    - name: Subir keystore (opcional)
      uses: actions/upload-artifact@v4
      with:
        name: keystore-backup
        path: keystore.jks
        retention-days: 7
