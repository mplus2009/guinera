name: Build and Sign APK

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Configurar Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Generar keystore y establecer variables
      run: |
        keytool -genkey -v \
          -keystore keystore.jks \
          -alias upload \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass 123456 \
          -keypass 123456 \
          -dname "CN=Test, OU=Test, O=Test, L=Test, ST=Test, C=ES"
        echo "KEYSTORE_PATH=$PWD/keystore.jks" >> $GITHUB_ENV
        echo "STORE_PASSWORD=123456" >> $GITHUB_ENV
        echo "KEY_PASSWORD=123456" >> $GITHUB_ENV

    - name: Preparar Gradle Wrapper
      run: |
        if [ ! -f "gradlew" ]; then
          echo "📦 Generando Gradle Wrapper..."
          gradle wrapper
        fi
        chmod +x gradlew

    - name: Compilar APK Release
      run: ./gradlew assembleRelease

    - name: Subir APK firmada
      uses: actions/upload-artifact@v4
      with:
        name: app-release-signed
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30
